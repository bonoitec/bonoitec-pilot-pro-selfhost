project_id = "rkfkibpcrqkchmtoogxq"

[auth]
site_url = "https://bonoitecpilot.fr"
additional_redirect_urls = [
  "https://bonoitecpilot.fr/**",
  "https://www.bonoitecpilot.fr/**",
  "https://bonoitec-pilot-pro.vercel.app/**",
  "http://localhost:8081/**",
  "http://localhost:8080/**",
]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 465
user = "resend"
pass = "env(RESEND_API_KEY)"
admin_email = "noreply@bonoitecpilot.fr"
sender_name = "BonoitecPilot"

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
skip_nonce_check = true

[functions.ai-diagnostic]
verify_jwt = false

[functions.send-repair-notification]
verify_jwt = false

[functions.send-email]
verify_jwt = false

[functions.create-checkout]
verify_jwt = false

[functions.check-subscription]
verify_jwt = false

[functions.customer-portal]
verify_jwt = false

[functions.update-repair-stock]
verify_jwt = false
